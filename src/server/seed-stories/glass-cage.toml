id = "glass-cage"

settingDescription = """
The Aethon Conveyor, an arcane transport running the imperial trunk line from the capital Valdris to Karavelle. Six levitating carriages pulled by an alchemical engine car, riding a stabilized ley-line current rather than rails — no stops, no escape, 36 hours to destination. The conveyor is luxury-class only: velvet curtains, alchemical lamplight, glass-domed observation cars. The murder happened at midnight somewhere over the Grey Flats, hundreds of miles of uninhabited marshland. Twelve passengers, five crew — and one killer who is still aboard. Elias Crowne, an information broker who knew the player's forgotten past, lies dead in his locked compartment. The player wakes with his blood on their hands and no memory of how it got there.\
"""

toneDescription = "Tense, claustrophobic, elegant menace. Silk curtains and bloodstains. Alchemical lamplight casting long shadows across mahogany and brass. Every conversation is a duel — every courtesy masks a threat. The world outside the windows is dark and empty, the conveyor humming with ley-line energy as it hurtles toward Karavelle. The amnesiac player navigates a web of secrets, unable to trust their own innocence or anyone else's."

initialDay = 4
initialSegment = 6
initialLocationId = "player_compartment"

