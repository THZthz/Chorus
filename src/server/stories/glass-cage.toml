His medical bag contains a set of surgical blades, one of which exactly matches the wound that killed Elias Crowne. Vale claims the bag was in the dining car during the murder — he had been called to treat a passenger's minor complaint shortly before midnight. He cannot prove where the bag was at the exact moment of death.

## Role

Was the first to examine the player after the body was found. Cleaned the blood from their hands. Told them — quietly — that he believed them.

## GM Guidance

Vale presents as the kindest person on the conveyor. He is either exactly what he appears or the most dangerous passenger aboard. The alibi gap, the matching blades, and his medical knowledge (paralytic toxins) make him a strong suspect. If innocent, his surgical expertise makes him a valuable forensic resource. If guilty, his kindness is a weapon.
"""
