description = """
You woke to the sound of screaming. Not your own — someone else's, muffled through the polished mahogany wall of the compartment beside yours. The blood on your hands was still warm. Your head pounded with the familiar ache of a past you cannot reach — faces at the edge of memory, voices that dissolve when you turn toward them. On the floor, where it must have fallen from your grip, a compartment key with the number scratched away. You don't know who you are. You don't know why you're on this conveyor. But the man in the next compartment — Elias Crowne — he knew. And now he's dead, a thin blade wound under his ribs, his door locked from the inside, his ledger missing. The other passengers are watching you with fear, suspicion, or calculation. The conveyor doesn't stop for 30 more hours. Somewhere in this levitating cage of velvet and brass, a killer is waiting — and they may know more about you than you do.\
"""

