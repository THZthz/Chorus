# ── Dossiers: Per-character backstory and GM reference ──

[[notes]]
name = "Dossier: Player"
content = """
## Identity & Amnesia

The player remembers nothing — not their name, not their destination, not how Crowne's blood got on their hands. The amnesia may be natural (trauma, head injury), induced (alchemical or sorcerous means), or voluntary (a memory seal the player placed on themselves). The truth is left open for the story to discover.

## Connection to Elias Crowne

Crowne knew the player before the amnesia. Hours before his death, they argued in the observation car — a heated exchange witnessed by other passengers. The player stormed out. Whether Crowne was a friend bringing a warning or a broker selling them out died with him.

## The Key

The brass key with the scratched-off number was found beside the player. It does not open their compartment or Crowne's. It opens an unknown lock somewhere on the conveyor — possibly a luggage locker, a crew compartment, a maintenance hatch, or a compartment registered under a false name.

## The Northern Provinces

When Garrick mentioned Crowne asking about a military posting in the northern provinces, the player felt an unexplained recognition — a cold wind, a stone tower, a face in the snow. The connection between the player's past, the northern provinces, and Crowne's interest is a central mystery.

## GM Guidance

The player is both detective and suspect. Every piece of evidence about Crowne's murder is also a clue about their own past. The two investigations — who killed Crowne, and who the player is — are intertwined. The truth of the player's identity should be discovered alongside (or through) solving the murder.
"""
aboutEntities = ["Player", "Elias Crowne", "Player's Key", "Garrick"]
aboutPlots = ["The Glass Cage", "The Truth"]

[[notes]]
name = "Dossier: Elias Crowne"
content = """
## Background

Elias Crowne dealt in secrets the way other men dealt in grain futures. Based in Valdris with a network stretching to Karavelle and beyond, he bought and sold information with practiced neutrality. His ledger — a ciphered journal containing every transaction, every secret, every client — was his life's work.

## Network

- **Silas**: Crowne's contact in Karavelle. Fed him information from Valdris — shipping manifests, guild politics, blackmail material. In exchange, Silas provided protection and a cut of the profits.
- **Lady Mireille Tessier**: Crowne's secret source in diplomatic circles. She fed him information for years. Half the ledger's contents originated with her.
- **Lord Aldric Vane**: Crowne was blackmailing Vane over fraudulent accounts. He had let Vane know, quietly, that his silence had a price.
- **Garrick**: Hours before his death, Crowne questioned Garrick about a military posting in the northern provinces — apparently connecting the player to something in that region.

## Final Hours

- Argued with the player in the observation car.
- Shared brandy with Garrick in the dining car, questioning him about northern provinces.
- Visited Purser Locke's office, seeking access to the passenger manifest — refused.
- Spoke with Brother Malachai in the lounge car around 11pm — agitated, drinking heavily. Malachai will not reveal what was said.
- Stabbed at approximately midnight. Door locked from inside. Ledger missing.

## The Ledger

Crowne's ledger is the most valuable object on the conveyor — and the most dangerous. It contains records of every secret he ever bought or sold, the identities of every client, and the details of every transaction. Whoever has it can destroy half the passengers aboard. If it was thrown into the Grey Flats, the truth dies with it.
"""
