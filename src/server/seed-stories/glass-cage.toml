brief = "Glass-domed ceiling above upholstered chairs — where passengers gather and Crystal plays her lyre."
description = """
The observation car is the Aethon's crown jewel. A dome of reinforced crystal arches overhead, offering an unobstructed view of the night sky and the faint blue-green shimmer of the ley-line current passing beneath the conveyor. During the day, passengers gather here to read, converse, and watch the continent slide past. At night, with the gas-lamps dimmed, the stars reflect in the glass like scattered salt, and the car becomes a place of quiet confidences.

This is where the player and Crowne were seen arguing, hours before his death — voices raised, the player storming out, Crowne standing alone beneath the dome with a drink in his hand and something unreadable on his face. Crystal often plays her lyre here in the evenings, the silver strings carrying through the carriage with an ethereal clarity that makes conversations falter and heads turn. The night of the murder, she played until midnight — then stopped abruptly, as if someone had laid a hand on her shoulder. No one saw who.\
"""

[entities.metadata]

