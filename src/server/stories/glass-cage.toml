[entities.metadata.conditions]

[[entities]]
type = "CHARACTER"
name = "Elias Crowne"
brief = "Deceased. Information broker. Body found in Compartment 4 of Passenger Car A — locked from the inside."
description = """
Male, early forties. Unremarkable appearance — thinning brown hair, forgettable but expensive clothes. Stabbed with a thin blade under the ribs. The wound shows traces of an alchemical paralytic. His compartment door was locked from the inside with an intact arcane seal. A ciphered ledger he was known to carry is missing from the compartment.
"""

[[entities]]
type = "CHARACTER"
name = "Lord Aldric Vane"
brief = "Aging merchant prince of House Vane. Occupies Compartment 8 in Passenger Car B."
description = """
Male, late fifties. Tall, silver-haired. Wears finely tailored but visibly outdated clothes. Carries a polished silver-handled cane. Boots show signs of careful repair. Speaks with the measured cadence of old nobility. Was seen near the passenger cars after midnight, claiming he could not sleep.
"""

[[entities]]
type = "CHARACTER"
name = "Magistra Iris Korr"
brief = "Magewarden investigator. Occupies Compartment 5 in Passenger Car A — adjacent to the crime scene."
description = """
Female, tall, angular. Iron-grey hair pulled back in a severe knot. Pale grey eyes. Carries a Magewarden badge and a small sealed dispatch case she does not open in public. Moves with economy. Has been watching the player since the body was discovered.
"""

[[entities]]
type = "CHARACTER"
name = "Silas"
brief = "Purported merchant. Occupies Compartment 6 in Passenger Car A. Traveling under a false identity."
description = """
Male, built like a dockworker — broad shoulders, thick hands with scarred knuckles, a jaw that has been broken at least once. Wears a merchant's coat that does not fit him well. His accent drifts between polished upper-level speech and Warrens gutter. Actual name unknown.
"""

[[entities]]
type = "CHARACTER"
name = "Lady Mireille Tessier"
brief = "Twice-widowed diplomat's wife. Occupies Compartment 9 in Passenger Car B — connected to Lord Vane's compartment."
description = """
Female, appears thirty-five, actually forty-seven. Half-elven — dark hair, high cheekbones, unlined skin. Dresses in grey silks and pearls. Speaks in a voice barely above a whisper. Has been aboard for twelve hours and has already gathered information about most passengers.
"""

[[entities]]
type = "CHARACTER"
name = "Doctor Cassian Vale"
brief = "Physician. Occupies Compartment 2 in Passenger Car A — two doors from the victim."
description = """
Male, thirty-eight. Open, attentive face with warm brown eyes. Gentle, unhurried manner. Trained at Valdris Medical College. Carries a medical bag containing surgical instruments. Was the first to examine the player after the body was discovered — cleaned the blood from their hands.
"""

[[entities]]
type = "CHARACTER"
name = "Crystal vi Elaris"
brief = "Singer. Occupies Compartment 1 in Passenger Car A — nearest the observation car."
description = """
Female, twenty-four, half-elven. Dark copper hair pinned loosely at the nape of her neck. Hazel eyes with gold flecks. Carries a small travel lyre with silver strings. Sat beside the player when others recoiled, asking if they were alright rather than if they did it.
"""

[[entities]]
type = "CHARACTER"
name = "Dravos Thorn"
brief = "Dealer in rare alchemical components. Occupies Compartment 12 in Passenger Car B — the furthest aft."
description = """
Male, drow. Pale hair, crimson eyes, dark grey skin marked with faint silver alchemical burn scars along forearms and throat. Speaks rarely and softly, with precise diction. Carries a locked alchemical cold-case chained to his left wrist by a thin mithril alloy. Has placed an additional lock on his compartment door.
"""

[[entities]]
type = "CHARACTER"
name = "Ysara va Keth"
brief = "Ley-line scholar, Valdris Academy. Occupies Compartment 7 in Passenger Car B."
description = """
Female, high elf. Tall, silver-white hair in an intricate braid. Slightly distracted manner. Carries a field resonator — a brass instrument that measures ley-line harmonics. Has been taking readings throughout the journey.
"""

[[entities]]
type = "CHARACTER"
name = "Brother Malachai"
brief = "Mendicant priest of the Star-Veil Order. Occupies Compartment 10 in Passenger Car B."
description = """
Male, sixty. Star-Veil robes are clean but threadbare, patched at the elbows, faded from deep blue to grey at the hems. Quiet, unobtrusive, given to long silences. Carries a worn book of prayers and a small silver pendulum. Travels on church charity. Was the last person seen speaking with Crowne before his death.
"""

[[entities]]
type = "CHARACTER"
name = "Garrick"
brief = "Discharged imperial legionnaire. Occupies Compartment 11 in Passenger Car B."
description = """
Male, half-orc. Six and a half feet tall, grey-green skin, tusks filed to regulation length. A scar runs from his right temple to his jaw. Discharged from the legions one month ago. Shared a bottle of brandy with Crowne in the dining car hours before the murder.
"""

# ── Crew ──

[[entities]]
type = "CHARACTER"
name = "Aldreth Voss"
brief = "Conductor of the Aethon. Office and quarters in the crew car."
description = """
Male. Wears a navy wool uniform with polished silver buttons. Mustache waxed into precise points. Voice calibrated to soothe wealthy passengers. Has deferred Magistra Korr's investigation, preferring the matter resolve quietly before reaching Karavelle.
"""

[[entities]]
type = "CHARACTER"
name = "Kest Winder"
brief = "Arcane engineer. Lives in the engine car, rarely leaves his post."
description = """
Male, gnome, age indeterminate. Goggles perpetually pushed up on his forehead. Grease under his fingernails. Speaks rapidly. Has detected an unusual interference pattern in the ley-line stabilizers that started three hours before the murder and has been growing stronger.
"""

[[entities]]
type = "CHARACTER"
name = "Thea"
brief = "Lead attendant. Quarters in the crew car; spends shifts moving through the passenger cars."
description = """
Female, twenty-six, half-elven. Still, watchful demeanor. Moves through the passenger cars with practiced invisibility. Was making rounds near Passenger Car A at midnight. Has not shared what she saw.
"""

[[entities]]
type = "CHARACTER"
name = "Oren Locke"
brief = "Purser. Office and quarters in the crew car. Keeps passenger records in a leather-bound ledger."
description = """
Male, thin, balding, precise. Arranges his inkwells by size. His passenger ledger contains ticket and identity records for all aboard. Crowne visited his office the afternoon before the murder requesting access to the passenger manifest — Locke refused.
"""

[[entities]]
type = "CHARACTER"
name = "Bram Ironkettle"
brief = "Steward. Quarters in the crew car; works primarily in the dining car."
description = """
Male, dwarf. Stout, bald, bearded. Has served meals on the Aethon for fifteen years. Has noted that small items — a paring knife, a length of wire — have gone missing from the galley.
"""

# ── Locations ──

[[entities]]
type = "LOCATION"
name = "Engine Car"
brief = "The Aethon's engine — arcane core, ley-line stabilizers, and Kest's domain. Crew only."
description = """
Contains the arcane core — a sphere of stabilized ley-energy in a containment ring — and banks of stabilizers in copper and quartz. The door is sealed with an arcane lock reset every six hours. Recent scorch marks are visible near the lock, as if someone probed it and backed off.
"""

[[entities]]
type = "LOCATION"
name = "Crew Car"
brief = "Crew quarters, conductor's office, purser's cubby, and small galley."
description = """
Narrow corridor of doors leading to modest private quarters. The conductor's office at the front has a desk, logbook, and speaking tube connecting to every car. The purser's cubby opposite holds ledgers and luggage manifests. A small galley at the rear supplies the dining car through a service hatch.
"""

[[entities]]
type = "LOCATION"
name = "Observation Car"
brief = "Glass-domed lounge at the front of the passenger section."
description = """
A dome of reinforced crystal arches overhead, offering an unobstructed view of the sky and the ley-line current passing beneath. Upholstered chairs arranged across the floor. Gas-lamps dim at night for stargazing. The player and Crowne were seen arguing here hours before the murder.
"""

[[entities]]
type = "LOCATION"
name = "Passenger Car A"
brief = "Six private compartments (1–6). Player in 3, Crowne's body in 4."
description = """
Narrow corridor of polished mahogany and brass fixtures. Each compartment has a fold-down bed, writing desk, wardrobe, and alchemical lamp. Doors lock from the inside with arcane seals — a resonance mechanism keyed to the occupant. Deep blue wool carpet. Gas-lamps at intervals. Compartment 4 remains sealed.
"""

[[entities]]
type = "LOCATION"
name = "Dining Car"
brief = "Communal dining between Passenger Car A and Passenger Car B."
description = """
Long polished oak table with linen, crystal, and silver service. An alchemical chandelier shifts through warm colors as the evening progresses. Positioned between the two passenger cars — anyone moving between them must cross here unless using the exterior maintenance gangway. Crowne and Garrick shared brandy here hours before the murder.
"""

[[entities]]
type = "LOCATION"
name = "Passenger Car B"
brief = "Six private compartments (7–12). Lord Vane (8), Lady Tessier (9), Dravos (12)."
description = """
Mirrors Car A in layout. Quieter atmosphere. Compartment 8 has a connecting door to Compartment 9 — a courtesy for married couples, used by neither for that purpose. Dravos Thorn has placed an additional lock on Compartment 12. The corridor near his door smells faintly of alchemical preservatives.
"""

[[entities]]
type = "LOCATION"
name = "Lounge Car"
brief = "Rear lounge — leather chairs, bar cabinet, and a crystal view of the ley-line trail."
description = """
Small and intimate — deep leather chairs around low tables. A bar cabinet stocked with spirits on the honor system. The rear wall is a single pane of crystal looking back along the ley-line current. Crowne spoke with Brother Malachai here an hour before his death. Lady Tessier was seen here alone around midnight.
"""

# ── Objects ──

[[entities]]
type = "OBJECT"
name = "Crowne's Ledger"
brief = "A ciphered journal containing Crowne's information network. Missing since the murder."
description = """
Black leather binding, slightly worn at the corners. Filled with Crowne's personal cipher — symbols, numbers, and abbreviated references. Not found on Crowne's body or in his compartment. Current location unknown.
"""

[[entities]]
type = "OBJECT"
name = "Murder Weapon"
brief = "A thin blade used to kill Elias Crowne. Missing."
description = """
Creates a clean, precise wound — slipped between the ribs at an upward angle. The blade is thin and surgical in character. The wound shows traces of an alchemical paralytic toxin. The weapon has not been found aboard the conveyor.
"""

[[entities]]
type = "OBJECT"
name = "Player's Key"
brief = "A brass compartment key with the number scratched off. Does not open the player's assigned compartment."
description = """
Brass, standard Aethon issue. The compartment number stamped on the bow has been deliberately gouged away with a blade edge. Found on the floor of the player's compartment. Does not open Compartment 3 (player) or Compartment 4 (Crowne). Opens an unknown lock somewhere on board.
"""

[[entities]]
type = "OBJECT"
name = "Dravos's Locked Case"
brief = "An alchemical cold-case chained to Dravos Thorn's wrist. Emits ley-line harmonic interference."
description = """
Small — approximately eighteen by twelve inches. Dark alloy that absorbs lamplight. Secured with an alchemical biometric lock keyed to Dravos. Chained to his left wrist by a thin mithril alloy. Emits a harmonic frequency measurable by Ysara va Keth's field resonator. Claimed to contain organic samples for a client in Karavelle.
"""

[[entities]]
type = "OBJECT"
name = "Crystal's Lyre"
brief = "A small travel lyre with silver strings. Hums audibly when the player is near."
description = """
Spruce body, silver strings. A travel instrument small enough to carry easily. The strings are silver — a gift from Crystal's mother. Silver does not normally resonate with ley-line energy. The lyre produces an audible hum when the player enters the room.
"""

