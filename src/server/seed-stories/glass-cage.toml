The crew car is narrow and practical — a corridor of doors leading to cramped but comfortable quarters. The conductor's office is at the front: a small desk, a logbook, a speaking tube that connects to every car. The purser's cubby sits opposite, stuffed with ledgers and luggage manifests. A small galley at the rear supplies the dining car through a service hatch. The crew quarters are modest but private — each a narrow bunk, a washstand, a small lockbox for personal effects. The walls are thinner here than in the passenger cars, and crew members have learned to speak quietly. At night, you can hear the engine humming through the floor — a constant reminder that the Aethon is alive.\
"""

