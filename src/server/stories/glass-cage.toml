[[notes]]
name = "Dossier: Thea"
content = """
## Background

Grew up in the Karavelle Warrens, the daughter of a human dockworker and an elven mother who disappeared when Thea was seven. Worked a Warrens tavern from age twelve — serving drinks to Harbor Rats, merchants, and slavers. Learned to read faces, anticipate violence, be invisible when invisibility was survival. The Aethon was supposed to be her escape.

