Kest is the only person who can diagnose and repair the stabilizer sabotage. He is oblivious to social nuance but brilliant with arcane engineering. The scorch marks on the engine room door mean someone else tried to access his domain. He is the player's best resource for understanding the technical side of the locked-room puzzle.
