[[notes]]
name = "Dossier: Crystal vi Elaris"
content = """
## Background

Twenty-four. Traveling to Karavelle to perform at the estate of a minor noble who heard her sing in Valdris and offered patronage. Her travel lyre was a gift from her mother, who was a singer of some note in the southern isles.

## The Anomaly

Silver strings do not resonate with ley-line energy. Ysara va Keth confirmed this. And yet every time the player enters the room, the lyre hums — a soft, almost sub-audible vibration that Crystal feels through her fingertips. She has stopped playing it when the player is present, afraid of what the resonance might reveal. The strings are silver. They should not do this.

## Connection to Player

She was in the observation car when the player first stumbled in, still dazed, still flecked with Crowne's blood. While other passengers recoiled or calculated, she crossed the room and sat beside them. She didn't ask if they did it. She asked if they were alright.

## GM Guidance

Crystal is warmth in a carriage full of ice. Her bond with the player is the emotional core of the story. The lyre resonance implies a connection that predates the amnesia — the player may be the source of the ley-line anomaly, or Crystal's mother's gift may not be what it seems. The lyre hums louder as the player draws closer to the truth.
"""
