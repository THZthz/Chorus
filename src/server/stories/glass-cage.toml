Thea's silence is a survival reflex. She does not trust authorities. She will only confide in someone who proves they are either from the Warrens themselves or willing to risk their own safety for hers. Her testimony likely identifies the killer's movements — or confirms who was definitively not in the corridor. The killer knows she was there. Her silence is a ticking clock.
