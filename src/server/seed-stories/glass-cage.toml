The engine car is a cathedral of brass and crystal. The arcane core pulses at its center — a sphere of stabilized ley-energy suspended in a containment ring, humming at a frequency you feel in your teeth. Stabilizers line the walls in banks of copper and quartz, their needles trembling with the constant work of keeping six levitating carriages riding a current of raw magic. The air is thick with ozone and the faint sweetness of overheated aether. Access is restricted to crew — the door is sealed with an arcane lock that Kest resets every six hours. Passengers are not permitted. That hasn't stopped someone from trying: the lock shows faint scorch marks, recent, as if someone probed it with a resonator and backed off when the alarm glyphs flared.\
