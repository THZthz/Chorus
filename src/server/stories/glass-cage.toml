2. Then Crowne bought him the drink.
3. Then Crowne asked about his military service — specifically a posting at a remote fort in the northern provinces.

## Connection to Player

The mention of the northern provinces triggered something in the player — a cold wind, a stone tower, a face in the snow. Crowne was using Garrick to confirm something about the player's past. What Garrick told him, and whether Garrick is protecting the player or himself, is unknown.

## GM Guidance

Garrick is not a suspect — he has no arcane or alchemical knowledge — but he is a crucial witness to Crowne's last hours. His shifting story may be simple distrust of authority (common among legionnaires), fear of being implicated, or knowledge that the player is dangerous. The northern provinces connection is the most important clue about the player's identity.
"""
