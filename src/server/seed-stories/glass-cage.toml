[[entities]]
id = "elias_crowne"
type = "CHARACTER"
name = "Elias Crowne"
brief = "An information broker found murdered in his locked compartment — the man who knew the player's true identity."
description = """
Elias Crowne dealt in secrets the way other men dealt in grain futures. Based in Valdris with a network stretching to Karavelle and beyond, he bought and sold information with the practiced neutrality of a man who knew better than to take sides. He was in his early forties, unremarkable in appearance — thinning brown hair, a ready smile that never reached his eyes, clothes that were expensive but forgettable. His ledger, a ciphered journal containing the details of every transaction, every secret, every client, was his life's work. It is now missing.

Hours before his death, he was seen arguing with the player in the observation car — a heated exchange that ended with the player storming out. At midnight, a thin blade slipped between his ribs in his own compartment. The door was locked from the inside. He knew the player from before the amnesia. Whether he was a friend bringing a warning or a broker selling them out died with him — but the truth is somewhere on this conveyor, and someone killed to keep it buried.\
"""

[entities.metadata]

[entities.metadata.attributes]
Occupation = "Information broker — bought and sold secrets across the imperial trunk line"
Death = "Stabbed at midnight in his locked compartment. Ledger missing. Door locked from inside."

[[entities]]
id = "lord_aldric_vane"
type = "CHARACTER"
name = "Lord Aldric Vane"
brief = "An aging merchant prince whose crumbling fortune made him Crowne's most desperate enemy."
description = """
Aldric Vane wears old money like a suit that no longer quite fits — the cut is impeccable, the fabric is twenty years out of fashion. His family made its fortune in alchemical textiles three generations ago, but bad investments and worse luck have hollowed out the vaults. He maintains the facade with desperate precision: polished boots, a silver-handled cane, a voice calibrated to remind you of his title. He was traveling to Karavelle to finalize a merger that would save his house from ruin. Crowne knew about the fraud that propped up the last three years of Vane's balance sheets — and had let Vane know, quietly, that his silence had a price. The night Crowne died, Vane was seen near the passenger cars well after midnight, claiming he couldn't sleep. He could not afford for Crowne to reach Karavelle alive.\
"""

[entities.metadata]

[entities.metadata.attributes]
Title = "Lord — old merchant nobility, House Vane"
Fortune = "Crumbling — desperate to save his house from financial ruin"
Motive = "Crowne was blackmailing him over fraudulent accounts"

[[entities]]
id = "magistra_iris_korr"
type = "CHARACTER"
name = "Magistra Iris Korr"
brief = "A Magewarden investigator traveling on official business, watching the player with professional suspicion."
description = """
Iris Korr has been a Magewarden for fifteen years, and in that time she has learned that the most dangerous lies are the ones people tell themselves. Tall, angular, hair pulled back in a severe iron-grey knot, she moves with the economy of someone who has been in enough fights to know that wasted motion gets you killed. Her eyes are pale grey and preternaturally still — they settle on a person and do not blink. She carries a Magewarden's badge and a small, sealed dispatch case she never opens in public.

She is traveling on official business she declines to discuss. The murder of Elias Crowne is technically outside her jurisdiction — Magewardens handle magical crimes, not ordinary homicides — but the strange nature of the locked compartment and the missing weapon has her attention. More than that, she is interested in the player: an amnesiac with blood on their hands who cannot explain where they came from. She has seen memory magic before, and what it leaves behind is rarely innocent. She is not convinced the player is guilty. She is not convinced they are not. She is waiting — and watching — for the slip that tells her which.\
"""

[entities.metadata]

[entities.metadata.attributes]
Occupation = "Magewarden Investigator"
Jurisdiction = "Magic-related crimes — the locked-room nature of the murder has her attention"
Suspicion = "Believes the player's amnesia may not be natural — watching for evidence"

[[entities]]
id = "silas"
type = "CHARACTER"
name = "Silas"
brief = "A Harbor Rat operative traveling under an alias — Crowne was his informant, and his delivery never came."
description = """
'Silas' is not his real name. The Harbor Rats do not send their people across the continent with paper trails. He is built like a dockworker — broad shoulders, thick hands scarred across the knuckles, a jaw that has been broken at least once. He wears a merchant's coat that doesn't quite suit him, the collar too stiff, the fabric too clean. When he speaks, his accent drifts — upper-level polish one moment, Warrens gutter the next.

He was Crowne's contact in Karavelle. Crowne fed him information from Valdris: shipping manifests, guild politics, blackmail material on nobles who did business in the lower city. In exchange, Silas provided protection and a cut of the profits. But Crowne's last message to him was different — urgent, almost panicked. He said he had something big, something that would change everything. He said he'd deliver it on the conveyor. Then he turned up dead, and whatever he was carrying is gone. Silas is stranded on a luxury transport full of the kind of people he's spent his life resenting, with no backup and a missing package that his superiors will expect him to produce. He does not care who killed Crowne, but he will find that package — and if the player knows where it is, he will find that out too.\
"""

[entities.metadata]

[entities.metadata.attributes]
Affiliation = "The Harbor Rats syndicate, Karavelle Warrens"
Alias = "Traveling under a false identity — real name unknown"
Objective = "Recover Crowne's missing delivery before reaching Karavelle"

[[entities]]
id = "lady_mireille_tessier"
type = "CHARACTER"
name = "Lady Mireille Tessier"
brief = "A diplomat's widow whose delicate manner conceals a collector of secrets and a deft manipulator."
description = """
Mireille Tessier has buried two husbands, both diplomats, both considerably older than her, both considerably wealthier at their deaths than at their weddings. She is forty-seven and looks thirty-five — half-elven blood keeping the years at bay, softening the corners, keeping her dark hair lustrous and her cheekbones high. She dresses in grey silks and pearls, speaks in a voice barely above a whisper, and has the uncanny ability to be in exactly the right place to overhear exactly the wrong thing.

She has been on the conveyor for twelve hours and already knows more about its passengers than they know about each other. She knows about Vane's debts. She knows Silas is not a merchant. She knows the player was arguing with Crowne hours before his death. She dispenses this information in small, elegant doses — a hint here, a confidence there — never asking for anything in return, never revealing her own interests. She claims to be returning to Karavelle to settle her late husband's estate. The truth is that Crowne had been feeding her information for years, and with him dead, she is the only one on this conveyor who knows exactly what was in his ledger — because half of it came from her.\
"""

[entities.metadata]

[entities.metadata.attributes]
Race = "Half-elf"
Background = "Twice-widowed diplomat's wife — wealthy, connected, watches everything"
"Hidden Role" = "Crowne's secret source — fed him information from diplomatic circles for years"

[[entities]]
id = "doctor_cassian_vale"
type = "CHARACTER"
name = "Doctor Cassian Vale"
brief = "A physician bound for Karavelle — the only person offering the player help, and the only one whose tools match the murder weapon."
description = """
Cassian Vale has the kind of face that makes people trust him immediately — open, attentive, with warm brown eyes and the faint lines of someone who smiles often. He is thirty-eight, a practicing physician trained at the Valdris Medical College, bound for a new post at a Karavelle hospital. His manner is gentle, unhurried, and deeply reassuring. When the player woke with blood on their hands, Vale was the one who checked their pupils, cleaned their hands, and told them — quietly — that he believed them.

Which makes it all the more unfortunate that his medical bag contains a set of surgical blades, one of which exactly matches the wound that killed Elias Crowne. Vale claims the bag was in the dining car during the murder — he had been called to treat a passenger's minor complaint shortly before midnight. He cannot prove where the bag was at the exact moment of death. He is either the kindest person on this conveyor or the most dangerous — and the player has no way to know which without getting close enough to find out.\
"""

[entities.metadata]

[entities.metadata.attributes]
Occupation = "Physician — trained at Valdris Medical College, bound for Karavelle"
Evidence = "His surgical kit contains blades matching Crowne's wound"
"Alibi Gap" = "Claims his bag was in the dining car — cannot prove it"

[[entities]]
id = "crystal_vi_elaris"
type = "CHARACTER"
name = "Crystal vi Elaris"
brief = "A half-elf singer drawn to the player by a pull she can't name — warmth in a carriage full of ice."
description = """
Crystal is twenty-four, with the kind of beauty that doesn't announce itself — you notice it slowly, the way you notice the sun coming out. Her hair is dark copper, pinned loosely at the nape of her neck; her eyes are hazel with flecks of gold that catch the alchemical lamplight. She is traveling to Karavelle to perform at the estate of a minor noble who heard her sing in Valdris and offered patronage. She carries a small travel lyre with silver strings — a gift from her mother, she says, nothing more.

She was in the observation car when the player first stumbled in, still dazed, still flecked with Crowne's blood. While the other passengers recoiled or calculated, she crossed the room and sat beside them. She didn't ask if they did it. She asked if they were alright. Since then, she has been a quiet presence at the player's side — not demanding, not suspicious, just... there. There is something about the player that draws her: a resonance she feels in her chest when they're close, a warmth that spreads through her palms. She tells herself it's compassion. But silver strings hum in proximity to ley-line energy, and Crystal's lyre has been singing every time the player enters the room. She doesn't know what it means. She's not sure she wants to find out — or stop it.\
"""

[entities.metadata]

[entities.metadata.stats]

[entities.metadata.opinions]
Player = "I don't know who they are. I don't know what they've done. But when I'm near them, the world feels sharper — like waking from a long sleep. The lyre hums. My skin hums. I should be afraid, but all I feel is this terrible, wonderful pull. What if the person I can't stop thinking about is the person everyone else wants to hang?"

[entities.metadata.attributes]
Occupation = "Singer — traveling to a noble patron's estate in Karavelle"
Race = "Half-elf"
"Notable Possession" = "Silver-stringed travel lyre — hums near ley-line energy, or near the player"

[[entities]]
id = "dravos_thorn"
type = "CHARACTER"
name = "Dravos Thorn"
brief = "A drow alchemist carrying a locked case he never opens — and secrets that hum in the dark."
description = """
Dravos Thorn is the only drow on the conveyor, and he wears his isolation like a cloak. Pale-haired, crimson-eyed, his dark grey skin marked with the faint silver tracery of old alchemical burns along his forearms and throat. He speaks rarely and softly, with the precise diction of someone who learned the surface tongue from books. He deals in rare alchemical components — stabilized ley-residue, crystallized aether, compounds that straddle the line between science and sorcery. His clients range from academic institutions to underground mages, and he does not discriminate.

His locked case is an alchemical cold-box, chained to his wrist by a thin mithril alloy. He claims it contains samples for a client in Karavelle. Ysara va Keth, the ley-line scholar, has noted that the case hums at a frequency that interferes with the conveyor's stabilizers — something that shouldn't be possible for organic samples. Dravos was in the observation car at midnight, alone, watching the Grey Flats pass beneath the glass dome. He says he saw nothing. His eyes, adapted to the Underdark, see better in darkness than anyone else on board — which means if someone passed through the observation car that night, he is either the best witness on the conveyor or the most accomplished liar.\
"""

[entities.metadata]

[entities.metadata.attributes]
Race = "Drow"
Occupation = "Dealer in rare alchemical components"
"Notable Possession" = "Locked alchemical cold-case — hums at ley-line frequencies, chained to his wrist"

[[entities]]
id = "ysara_va_keth"
type = "CHARACTER"
name = "Ysara va Keth"
brief = "A high elf ley-line scholar who understands the conveyor's systems better than its crew."
description = """
Ysara va Keth has spent forty years studying the imperial ley-line network — the currents of arcane energy that crisscross the continent like invisible rivers. She is a senior scholar at the Valdris Academy, returning to her native Karavelle for the first time in a decade. She is tall even by elven standards, with silver-white hair worn in an intricate braid and the slightly distracted manner of someone whose attention is always half-elsewhere. She carries a field resonator — a brass instrument that measures ley-line harmonics — and has been taking readings throughout the journey, a habit of academic reflex.

She understands the Aethon's engines better than Kest, the actual engineer. She noticed, three hours before the murder, that the ley-line stabilizers were oscillating at an unusual frequency — something on board was generating interference. She mentioned this to the conductor, who dismissed it. Since Crowne's death, the interference has grown stronger. Ysara believes someone is tampering with the conveyor's arcane systems — a diversion, a sabotage, or something worse. She also knows that the 'locked compartment' where Crowne died uses an arcane seal, not a physical lock, and that such seals can be circumvented by anyone who understands resonance frequencies. She can name exactly three people on board with that knowledge. She won't say who they are — not yet.\
"""

[entities.metadata]

[entities.metadata.attributes]
Race = "High elf"
Occupation = "Ley-line scholar, Valdris Academy"
Expertise = "Understands the conveyor's arcane systems — including how the compartment lock could be bypassed"
"Key Observation" = "Noticed ley-line interference before the murder — believes someone tampered with the systems"

[[entities]]
id = "brother_malachai"
type = "CHARACTER"
name = "Brother Malachai"
brief = "A mendicant priest of the Star-Veil Order — the only passenger more concerned with souls than secrets."
description = """
Brother Malachai is sixty years old and has the face of someone who has made peace with everything he's lost. His Star-Veil robes are clean but threadbare, patched at the elbows, the deep blue fabric faded to grey at the hems. He travels on church charity — the Order paid for his ticket, a rare indulgence for an itinerant priest. He is quiet, unobtrusive, given to long silences and the occasional unexpected insight. He carries no weapon, no ledger, no locked case — only a worn book of prayers and a small silver pendulum he uses in his rites.

He was the last person to speak with Crowne before his death. They were seen in the lounge car around eleven — Crowne, agitated and drinking; Malachai, listening with the practiced stillness of a man who has heard a thousand confessions. What Crowne said to him, Malachai will not reveal. The seal of the confessional, he says. The other passengers find this infuriating. Malachai finds their anger instructive. He has spent his life among sinners, politicians, and the dying, and he has learned that the truth comes out in its own time — and that the guilty often confess before anyone asks. He is watching. He is waiting. He has done this before.\
"""

[entities.metadata]

[entities.metadata.attributes]
Order = "Star-Veil Order — mendicant priest"
"Last Contact" = "Spoke with Crowne an hour before his death — will not reveal what was said"
Role = "Moral witness — holds Crowne's last confession in confidence"

[[entities]]
id = "garrick"
type = "CHARACTER"
name = "Garrick"
brief = "A discharged half-orc legionnaire who shared drinks with Crowne hours before the murder — and isn't talking about it."
description = """
Garrick is used to people being afraid of him. Six and a half feet tall, grey-green skin, tusks that have been filed down to regulation length — he spent twelve years in the imperial legions before being discharged last month. The papers say 'medical reasons.' The scar that runs from his right temple to his jaw suggests something more complicated. He is heading to Karavelle because he heard there was work for men who know how to fight and don't ask questions. He doesn't know anyone in the city. He doesn't know anyone on the conveyor.

Except, apparently, Elias Crowne. They were seen in the dining car hours before the murder, sharing a bottle of brandy. Witnesses describe the conversation as intense — not an argument, but close. When asked what they discussed, Garrick's answers are clipped and contradictory. First he says they were strangers making small talk. Then he admits Crowne bought him the drink. Then he says Crowne asked about his military service — specifically, about a posting at a remote fort in the northern provinces. The player's ears prick up at this. The northern provinces. Something about that feels familiar — a cold wind, a stone tower, a face in the snow. What did Crowne know about the northern provinces? And what does Garrick know that he's not saying?\
"""

[entities.metadata]

[entities.metadata.attributes]
Race = "Half-orc"
Background = "Imperial legionnaire — twelve years, recently discharged"
"Connection to Victim" = "Drank with Crowne hours before the murder — the conversation may connect to the player's past"

# ── Crew ────────────────────────────────────────────────────────

[[entities]]
id = "aldreth_voss"
type = "CHARACTER"
name = "Aldreth Voss"
brief = "Conductor of the Aethon — proud of his spotless record and more worried about the conveyor's reputation than justice."
description = """
Aldreth Voss has been the Aethon's conductor for eight years, and in that time he has never had a complaint filed, a schedule missed, or a passenger dissatisfied. He wears his uniform like a second skin — navy wool with silver buttons, polished to a mirror shine. His mustache is waxed into precise points. His voice is calibrated to soothe the anxieties of the wealthy, and he deploys it like a tool.

The murder of Elias Crowne is, to Voss, a catastrophe of a very specific kind: a reputational one. He cannot fathom that one of his passengers could be a killer. He cannot accept that his conveyor — his spotless, prestigious conveyor — is now a crime scene. When Magistra Korr offered to conduct an investigation, Voss deferred — not because he has a better plan, but because he is hoping the problem will resolve itself quietly before they reach Karavelle. It will not. Every hour he delays, evidence degrades and the killer watches.\
"""

[entities.metadata]

[entities.metadata.attributes]
Role = "Conductor — runs the Aethon with iron courtesy"
Priority = "Reputation — wants the matter resolved quietly, not investigated thoroughly"

[[entities]]
id = "kest_winder"
type = "CHARACTER"
name = "Kest Winder"
brief = "A gnome engineer who maintains the arcane engine — understands harmonics, not people."
description = """
Kest Winder has spent more time inside the Aethon's engine than he has in conversation with another living being. He is a gnome of indeterminate age — somewhere between forty and a hundred — with goggles perpetually pushed up on his forehead, grease under his fingernails, and the slightly manic energy of someone whose mind is always running three steps ahead of his mouth. He lives in the engine car, emerging only when summoned or when something in the harmonics 'feels wrong.'

The murder barely registers with him — not out of callousness, but because human violence is outside his frame of reference. Machines, he understands. Ley-line resonance, he understands. The strange interference pattern that started three hours before the murder and has been growing stronger? That, he understands — and it terrifies him. Someone on this conveyor knows enough about arcane engineering to sabotage the stabilizers. If the interference continues, the Aethon won't reach Karavelle.\
"""

[entities.metadata]

[entities.metadata.attributes]
Race = "Gnome"
Role = "Arcane Engineer — maintains the Aethon's ley-line drive"
Observation = "Detected interference in the stabilizers — fears sabotage, not murder"

[[entities]]
id = "thea"
type = "CHARACTER"
name = "Thea"
brief = "A half-elf lead attendant who grew up in the Warrens — sees everything, says nothing."
description = """
Thea is twenty-six, half-elven, and has the particular stillness of someone who learned as a child that being noticed was dangerous. She grew up in the Warrens, the daughter of a human dockworker and an elven mother who disappeared when Thea was seven. She worked the Sinking Dock tavern from age twelve, serving drinks to Harbor Rats and merchants and the occasional slaver — learning to read faces, to anticipate violence, to be invisible when invisibility was survival. The Aethon, with its silk curtains and wealthy passengers, is supposed to be her escape from all of that.

She was on duty the night Crowne died, making her rounds through the passenger cars. She saw who was in the corridor near Crowne's compartment. She saw who wasn't in their own compartment when they claimed to be. She has not told anyone what she saw — not the conductor, not the Magistra, not the player. In the Warrens, you don't volunteer information to authorities. You wait. You watch. You survive. But the killer knows she was there, and her silence is a ticking clock.\
"""

[entities.metadata]

[entities.metadata.attributes]
Race = "Half-elf"
Role = "Lead Attendant, Aethon Conveyor"
Background = "Grew up in the Warrens, Karavelle — learned to read people to survive"
Secret = "Saw who was near Crowne's compartment at midnight — will not reveal it without trust or pressure"

[[entities]]
id = "oren_locke"
type = "CHARACTER"
name = "Oren Locke"
brief = "The Aethon's purser — fastidious, officious, and in possession of every passenger's secrets."
description = """
Oren Locke has been a purser for twenty-three years, and he has never once lost a luggage manifest, mislogged a ticket, or failed to verify a passenger's identity. He is thin, balding, precise to the point of irritation — the kind of man who arranges his inkwells by size and knows exactly how many minutes late breakfast is. He keeps the passenger records in a leather-bound ledger that never leaves his person, and those records contain things the passengers would prefer stayed private. False names. Forged credentials. Tickets paid for by third parties who should not exist.

Crowne visited Locke's office the afternoon before his death, requesting access to the passenger manifest. Locke refused. The next morning, someone had been through his records — nothing taken, but things moved, as if someone was looking for a specific entry. Locke suspects Crowne came back. He is now terrified that whatever Crowne found in those records is what got him killed — and that the killer may come for the manifest next.\
"""

[entities.metadata]

[entities.metadata.attributes]
Role = "Purser — manages tickets, luggage manifests, passenger records"
Knowledge = "Knows which passengers are traveling under false identities"
Incident = "Crowne tried to access the passenger manifest hours before his death"

[[entities]]
id = "bram_ironkettle"
type = "CHARACTER"
name = "Bram Ironkettle"
brief = "The Aethon's dwarf steward — gruff, unflappable, and entirely unconcerned about the murder."
description = """
Bram Ironkettle has served meals on the Aethon for fifteen years. He is stout, bald, bearded, and possessed of the particular serenity that comes from having seen every possible variation of human folly play out over dinner service. He has watched nobles propose marriage and dissolve into divorce. He has seen business partners become mortal enemies between the soup and the fish course. One stabbing in a locked compartment is, to Bram, a moderately eventful Tuesday.

His calm is not indifference — it is perspective. He knows, in the way that servants always know, more than he lets on. He knows which passengers drink too much and which ones never touch the brandy. He knows who looks at whom across the dining car. He knows that someone has been stealing small items from the galley — a paring knife, a length of wire, items that could, in the right hands, become tools for something darker. He assumed it was a passenger with peculiar appetites. He is now reconsidering that assumption.\
"""

[entities.metadata]

[entities.metadata.attributes]
Race = "Dwarf"
Role = "Steward — serves meals, maintains passenger cars"
Tenure = "15 years on the Aethon — seen everything, surprised by nothing"
Observation = "Someone has been stealing small items from the galley"

