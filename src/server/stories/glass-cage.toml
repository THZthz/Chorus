# ── Characters ──

[[entities]]
id = "#player#"
type = "CHARACTER"
name = "Player"
brief = "An amnesiac passenger in Compartment 3 of Passenger Car A. Blood on their hands when discovered."
description = """
No identification. No memory of who they are or why they are aboard. Woke to the sound of screaming from the adjacent compartment. Hands were wet with still-warm blood. A brass compartment key with its number scratched away lay on the floor nearby. Currently the prime suspect in the murder of Elias Crowne.
"""

