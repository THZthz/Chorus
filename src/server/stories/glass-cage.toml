[[notes]]
name = "Dossier: Ysara va Keth"
content = """
## Background

Forty years studying the imperial ley-line network. Senior scholar at Valdris Academy. Returning to her native Karavelle for the first time in a decade. Understands the Aethon's engines almost as well as Kest, the actual engineer.

