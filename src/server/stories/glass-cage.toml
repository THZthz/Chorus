[[notes]]
name = "Dossier: Brother Malachai"
content = """
## Background

Sixty years old. Has the face of someone who has made peace with everything he has lost. The Star-Veil Order paid for his ticket — a rare indulgence for an itinerant priest. He has spent his life among sinners, politicians, and the dying.

## The Confession

Malachai was the last person to speak with Crowne before his death. They were seen in the lounge car around 11pm — Crowne agitated, drinking heavily; Malachai listening with the practiced stillness of a man who has heard a thousand confessions. What Crowne said to him, Malachai will not reveal. The seal of the confessional is absolute by the laws of the Star-Veil Order.

## GM Guidance

Malachai is a moral witness, not a source of information. He cannot be pressured or tricked into breaking his vows. But his observations of other passengers — who is afraid, who is lying, who is in pain — are sharp and freely given. If the player earns his trust without demanding his secrets, he may offer guidance. His presence on the conveyor may not be coincidental — the Order may have known something was going to happen.
"""
aboutEntities = ["Brother Malachai", "Elias Crowne"]
