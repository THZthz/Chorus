[[notes]]
name = "Dossier: Lord Aldric Vane"
content = """
## Background

House Vane made its fortune in alchemical textiles three generations ago. Bad investments and worse luck have hollowed out the vaults. Lord Vane maintains the facade with desperate precision, but his fortune is crumbling. He was traveling to Karavelle to finalize a merger that would save his house from ruin.

## Motive

Crowne possessed documentation proving that the last three years of Vane's balance sheets were fraudulent. Crowne had communicated a demand for payment before boarding. Vane could not afford for Crowne to reach Karavelle alive — exposure would destroy the merger and his house.

## Night of the Murder

Vane claims he could not sleep and was walking near the passenger cars after midnight. His compartment (8) connects to Lady Tessier's (9) — a feature neither requested but both find useful. No witnesses confirm his whereabouts at the exact time of death.

## GM Guidance

Vane has the clearest financial motive and no solid alibi. He makes an excellent red herring — or the actual killer. If guilty, he would need an accomplice with alchemical knowledge (for the paralytic toxin) and arcane knowledge (for the seal bypass). If innocent, his desperation makes him a useful source of information about other passengers' secrets.
"""
aboutEntities = ["Lord Aldric Vane", "Elias Crowne", "Lady Mireille Tessier"]
aboutPlots = ["The Glass Cage", "The Web"]

[[notes]]
name = "Dossier: Magistra Iris Korr"
content = """
## Background

Fifteen years as a Magewarden. Has learned that the most dangerous lies are the ones people tell themselves. Traveling on official business she declines to discuss. The sealed dispatch case she carries is never opened in public.

## Investigation

The murder of Elias Crowne is technically outside her jurisdiction — Magewardens handle magical crimes, not ordinary homicides. But the locked compartment and missing weapon have her attention because they suggest arcane involvement. She is particularly interested in the player: an amnesiac with blood on their hands who cannot explain where they came from. She has seen memory magic before, and what it leaves behind is rarely innocent.

## GM Guidance

Korr is not convinced the player is guilty. She is not convinced they are not. She is watching for the slip that tells her which. She respects evidence over accusation. If the player produces real leads, she will follow them — even if it points to someone powerful. She is a potential ally if the player proves credible, and a persistent threat if they appear to be the killer.
"""
aboutEntities = ["Magistra Iris Korr", "Player"]
aboutPlots = ["The Glass Cage", "The Hunter"]

[[notes]]
name = "Dossier: Silas"
content = """
## Background

'Silas' is not his real name. The Harbor Rats do not send operatives across the continent with paper trails. He grew up in the Karavelle Warrens. His accent drifts between upper-level polish and Warrens gutter depending on who he is talking to.

## Relationship with Crowne

Crowne was his informant in Valdris — feeding shipping manifests, guild politics, blackmail material. In exchange, Silas provided protection and a cut of the profits. Crowne's last message was urgent, almost panicked: he had something big that would change everything, and he would deliver it on the conveyor.

## Current Objective

Find Crowne's missing delivery before the conveyor reaches Karavelle. His superiors will expect him to produce it. He does not care who killed Crowne, but he needs that package — and if the player knows where it is, he will find that out.

## GM Guidance

Silas is a blunt instrument in a world of subtle knives. He can threaten, intimidate, and apply pressure in ways the other passengers won't. But he is also stranded without backup in a social environment he resents. His false merchant identity is thin. If exposed, he becomes volatile.
"""
aboutEntities = ["Silas", "Elias Crowne", "Crowne's Ledger"]
aboutPlots = ["The Glass Cage", "The Hunted"]

[[notes]]
name = "Dossier: Lady Mireille Tessier"
content = """
## Background

Half-elven blood keeps the years at bay. Has buried two husbands, both diplomats, both considerably older and wealthier at their deaths than at their weddings. Wealthy, connected, and watches everything.

## Relationship with Crowne

Crowne's secret source in diplomatic circles. Fed him information for years. She knows more about the contents of his ledger than anyone else aboard — because half of it came from her. With Crowne dead, she is the only one who knows exactly what was in it.

## Behavior

Dispenses information in small, elegant doses — a hint here, a confidence there — never asking for anything in return, never revealing her own interests. Has the uncanny ability to be in exactly the right place to overhear exactly the wrong thing. She was in the lounge car alone around midnight, nursing a glass of wine.

## GM Guidance

Tessier is the information hub. She knows Vane's debts, knows Silas is not a merchant, knows the player argued with Crowne. She is never the killer — she gains more from keeping secrets than destroying them — but she may know who is. Her help always comes with unspoken strings.
"""
aboutEntities = ["Lady Mireille Tessier", "Elias Crowne", "Crowne's Ledger", "Lord Aldric Vane", "Silas"]
aboutPlots = ["The Glass Cage", "The Web"]

[[notes]]
name = "Dossier: Doctor Cassian Vale"
content = """
## Background

Trained at Valdris Medical College. Bound for a new post at a Karavelle hospital. His manner is gentle, unhurried, and reassuring.

