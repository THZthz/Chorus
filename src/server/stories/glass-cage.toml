Voss views the murder as a reputational catastrophe. He has deferred Magistra Korr's investigation at every turn, hoping the matter will resolve quietly before Karavelle. He has forbidden passenger access to the crew car and engine car. Protocol, he says. But the scorch marks on the engine room door suggest his protocols are not preventing anything.

