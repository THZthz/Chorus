aboutPlots = ["The Bond", "The Truth"]

[[notes]]
name = "Dossier: Dravos Thorn"
content = """
## Background

The only drow on the conveyor. Wears his isolation like a cloak. Speaks rarely and softly, with the precise diction of someone who learned the surface tongue from books. His clients range from academic institutions to underground mages, and he does not discriminate.

## The Case

The locked alchemical cold-case is chained to his wrist. He claims it contains stabilized organic samples for a client in Karavelle — temperature-sensitive, commercially valuable, benign. Ysara's field resonator disagrees. The case emits a harmonic frequency that interferes with the conveyor's ley-line stabilizers. Organic matter does not produce ley-line harmonics.

## Night of the Murder

Dravos was in the observation car at midnight, alone, watching the Grey Flats pass beneath the glass dome. He says he saw nothing. His eyes, adapted to the Underdark, see better in darkness than anyone else on board — which means if someone passed through the observation car that night, he is either the best witness on the conveyor or the most accomplished liar.

## GM Guidance

Dravos has the alchemical expertise to produce the paralytic toxin on the murder weapon. But his isolation and visible otherness make him an easy target for suspicion — too easy. The case's true contents and his real purpose on the conveyor are more interesting than whether he stabbed Crowne. The interference from his case may be incidental, deliberate, or a red herring.
"""
