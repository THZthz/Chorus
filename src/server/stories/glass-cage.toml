Ysara is the technical expert. She can explain how the murder was done (arcane seal bypass) and identify the growing threat to the conveyor (stabilizer sabotage). Her reluctance to name the three people with resonance knowledge makes her a gatekeeper — the player must earn her trust or find another way to get the names.
"""
