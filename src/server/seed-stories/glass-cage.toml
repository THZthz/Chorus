Atmosphere = "Gathering place by day, intimate by night — Crystal plays her lyre here"

[[entities]]
id = "passenger_car_a"
type = "LOCATION"
name = "Passenger Car A"
brief = "Six private compartments (1–6) — the player in compartment 3, the victim in compartment 4."
description = """
Passenger Car A is a narrow corridor of polished mahogany and brass fixtures, lined with six private compartments. Each compartment is small but luxurious: a fold-down bed, a writing desk, a wardrobe, and an alchemical lamp that dims with a touch. The doors lock from the inside with arcane seals — a simple resonance mechanism that only the occupant can engage. The corridor is carpeted in deep blue wool that muffles footsteps. Gas-lamps burn at intervals, casting pools of warm light between stretches of shadow.

Compartment 3 belongs to the player. Compartment 4 belonged to Elias Crowne. The door to compartment 4 was locked from the inside when Crowne's body was discovered. The arcane seal was intact. The compartment has no windows — ventilation comes through a brass grille too small for anything larger than a rat. How the killer entered, and how they left, is the central question. The blood on the player's hands suggests they were in the room. The locked door suggests no one could have been.\
"""

[entities.metadata]

[entities.metadata.attributes]
Compartments = "1 through 6"
"Key Occupants" = "Compartment 3 — Player. Compartment 4 — Elias Crowne (victim)"
"Crime Scene" = "Compartment 4 — locked from inside, arcane seal intact, killer unknown"

[[entities]]
id = "dining_car"
type = "LOCATION"
name = "Dining Car"
brief = "Communal table beneath an alchemical chandelier — the social hub where everyone must eventually appear."
description = """
The dining car is the Aethon's center of gravity. A long table of polished oak runs its length, set with linen, crystal, and silver — the kind of service that reminds passengers what they paid for. An alchemical chandelier overhead shifts through a slow spectrum of warm colors as the evening progresses, from amber at aperitif to deep rose at dessert. Bram Ironkettle presides over service from the galley hatch, appearing and disappearing with plates and bottles with the practiced invisibility of a career steward.

At meal times, the car becomes the conveyor's crossroads — every passenger must eventually pass through. Breakfast is a quiet affair of coffee and pastries; dinner is the main event, a multi-course ritual where the seating arrangements are as revealing as the conversation. The night of the murder, Crowne dined here with Garrick, sharing a bottle of brandy long after the other passengers had retired. Several passengers later claimed to be in their compartments. The dining car's position between the two passenger cars means that anyone going from one to the other would be visible from the table — unless they waited until the steward had extinguished the chandelier for the night.\
"""

[entities.metadata]

[entities.metadata.attributes]
Position = "Between Passenger Car A and Passenger Car B — the crossroads"
"Key Event" = "Crowne and Garrick drank here hours before the murder"
Atmosphere = "Formal meals by evening, empty and dark after the chandelier is extinguished"

[[entities]]
id = "passenger_car_b"
type = "LOCATION"
name = "Passenger Car B"
brief = "Six private compartments (7–12) — where half the passengers sleep, conspire, and hide."
description = """
Passenger Car B mirrors Car A in layout — six compartments along a carpeted corridor — but the atmosphere is different. Quieter. The passengers berthed here tend to keep to themselves. Lord Vane's compartment (8) has a connecting door to Lady Tessier's (9) — a courtesy for married couples that neither of them requested and both find useful. Dravos Thorn occupies compartment 12, the furthest aft, and the corridor near his door smells faintly of alchemical preservatives. He has placed his own additional lock on the door.

The car's distance from the observation car and dining car means its occupants had further to travel the night of the murder. Several of them claim to have been asleep by midnight. The corridor is unmonitored — the crew passes through only on scheduled rounds. Anyone with a reason to be in Passenger Car A that night had to pass through the dining car, or walk the exterior maintenance gangway — a narrow catwalk open to the elements, 200 feet above the Grey Flats, in the dark.\
"""

[entities.metadata]

[entities.metadata.attributes]
Compartments = "7 through 12"
"Notable Passengers" = "Lord Vane (8), Lady Tessier (9), Dravos Thorn (12)"
"Access Routes" = "Through dining car, or via exterior maintenance gangway"

[[entities]]
id = "lounge_car"
type = "LOCATION"
name = "Lounge Car"
brief = "Rear observation lounge — intimate seating, a bar cabinet, and conversations that lower voices."
description = """
The lounge car is smaller and more intimate than the observation car — a place for late-night conversations over brandy, private negotiations, and the kind of confidences that don't survive daylight. Deep leather chairs cluster around low tables. A bar cabinet stands against one wall, stocked with better spirits than are served at dinner — passengers help themselves, on the honor system. The rear wall is a single pane of crystal, looking back along the ley-line current, the shimmer fading into distance like a road disappearing into night.

Crowne visited the lounge car an hour before his death, speaking with Brother Malachai in low, urgent tones. What was said remains between the priest and his god. Later, around the time of the murder, Lady Tessier was seen here — alone, she says, nursing a glass of wine and watching the stars. The lounge car is at the opposite end of the conveyor from the engine, the furthest point from Kest's domain. If the killer wanted to move between passenger cars without being seen, they would not pass through here. If they wanted privacy, they would.\
"""

[entities.metadata]

[entities.metadata.attributes]
Position = "Rear of the conveyor — farthest from the engine car"
"Key Events" = "Crowne's last conversation (with Brother Malachai), Lady Tessier's midnight solitude"
Atmosphere = "Intimate, quiet — brandy, leather, starlight"

# ── Objects ─────────────────────────────────────────────────────

[[entities]]
id = "crownes_ledger"
type = "OBJECT"
name = "Crowne's Ledger"
brief = "A ciphered journal containing Elias Crowne's information network — debts, secrets, identities. It is missing."
description = """
Crowne's ledger was his life's work, and it died with him — or vanished, which amounts to the same thing. Bound in black leather, slightly worn at the corners, filled with Crowne's own cipher: a dense script of symbols, numbers, and abbreviated references that only a handful of people in the world could read. The ledger contained records of every transaction, the details of every secret he had ever bought or sold, and the identities of every client who had ever trusted him with information they would kill to keep buried. It was not on his body when he was found. It is not in his compartment. Someone on this conveyor has it — or someone threw it into the Grey Flats, and the truth with it.\
"""

[entities.metadata]

[entities.metadata.attributes]
Status = "Missing — not on Crowne's body, not in his compartment"
Contents = "Ciphered records of Crowne's entire information network"
Significance = "The most likely motive for murder — half the passengers would kill for it"

[[entities]]
id = "murder_weapon"
type = "OBJECT"
name = "Murder Weapon"
brief = "A thin alchemical blade — still missing, somewhere on the conveyor."
description = """
The wound that killed Elias Crowne was clean, precise, and shallow — a blade slipped between the ribs at an angle that suggests the killer knew exactly where to aim. The edge was thin, surgical in character. But the wound also shows traces of a paralytic toxin — alchemical in nature, fast-acting — that would have rendered Crowne immobile before he could cry out. No ordinary blade carries such a toxin. The weapon was either purpose-made or modified by someone with alchemical knowledge. It has not been found. It is still on the conveyor — hidden in a compartment, dropped down a service hatch, or carried by someone who smiles at the player across the dining car.\
"""

[entities.metadata]

[entities.metadata.attributes]
Characteristics = "Thin blade, surgical precision, traces of alchemical paralytic toxin"
Status = "Missing — not found on board"
Implication = "Killer has alchemical or medical knowledge"

[[entities]]
id = "players_key"
type = "OBJECT"
name = "Player's Key"
brief = "A compartment key with the number scratched off — it doesn't match the player's assigned room."
description = """
The key was on the floor of the player's compartment when they woke — dropped, presumably, from their own hand. It is brass, standard Aethon issue, the kind issued to every passenger for their compartment door. Except the number stamped on the bow has been deliberately scratched away — scored with the edge of another key or a small blade, the metal gouged deep enough to obliterate the digits. It does not open the player's assigned compartment (number 3). It does not open Crowne's compartment (number 4). It opens something else — a luggage locker, a crew room, a compartment that belongs to someone who has not reported a missing key. The player has no memory of holding it, no memory of scratching away the number, no memory of what door it was meant to unlock. But someone on this conveyor knows what this key opens — and they know the player had it.\
"""

[entities.metadata]

[entities.metadata.attributes]
Description = "Brass compartment key, number deliberately scratched off"
Discovery = "Found on the floor of the player's compartment — likely dropped from their hand"
Mystery = "Does not open the player's compartment or Crowne's — what does it unlock?"

[[entities]]
id = "dravos_case"
type = "OBJECT"
name = "Dravos's Locked Case"
brief = "An alchemical cold-case chained to Dravos Thorn's wrist — it hums at frequencies that shouldn't be possible."
description = """
The case is small — perhaps eighteen inches by twelve — made of a dark alloy that seems to absorb lamplight rather than reflect it. A thin mithril chain secures it to Dravos's left wrist, long enough to allow him to eat and sleep but never to set the case down out of reach. The lock is alchemical, keyed to his own biometric resonance — no one else can open it. Dravos claims it contains samples for a client in Karavelle: stabilized organic compounds, temperature-sensitive, commercially valuable but benign.

Ysara va Keth's field resonator disagrees. The case emits a harmonic frequency that interferes with the conveyor's ley-line stabilizers — subtle, but measurable, and growing stronger as the journey progresses. Organic matter does not produce ley-line harmonics. Something inside that case is arcane in nature, and it has been active since before the murder. Whether it is evidence, motive, or something else entirely, only Dravos knows — and Dravos is not opening the case for anyone.\
"""

[entities.metadata]

[entities.metadata.attributes]
Owner = "Dravos Thorn"
Description = "Alchemical cold-case, biometric lock, chained to owner's wrist"
Anomaly = "Emits ley-line harmonic interference — the contents may not be organic as claimed"

[[entities]]
id = "crystals_lyre"
type = "OBJECT"
name = "Crystal's Lyre"
brief = "A small travel lyre with silver strings — a gift from Crystal's mother that hums when the player is near."
description = """
The lyre is small and unassuming — a travel instrument, designed to be carried easily and played in intimate settings. The body is pale spruce, polished to a warm glow. The strings are silver, a luxury for a musician of Crystal's means, and she says they were a gift from her mother, who was herself a singer of some note in the southern isles. Crystal plays beautifully — not technically perfect, but with an emotional clarity that silences the observation car and draws passengers from their compartments to listen.

Silver does not resonate with ley-line energy. Ysara va Keth confirmed this, politely, over dinner. And yet every time the player enters the room, the lyre hums — a soft, almost sub-audible vibration that Crystal feels through her fingertips. She has stopped playing it when the player is present, afraid of what the resonance might reveal. The strings are silver. They should not do this. Either the lyre is not what Crystal believes it to be, or the player is not what anyone believes — or both.\
"""

[entities.metadata]

[entities.metadata.attributes]
Owner = "Crystal vi Elaris"
Material = "Spruce body, silver strings — a gift from her mother"
Anomaly = "Silver should not resonate with ley-line energy, but the lyre hums when the player is near"

